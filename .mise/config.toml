[tools]
node = "24.11.1"
pnpm = "10.29.3"

[tasks.validate]
description = "Run all validation checks (typecheck, lint, format, knip, test)"
run = """
pnpm install --frozen-lockfile
pnpm typecheck
pnpm lint
pnpm format:check
pnpm knip
pnpm test
"""

[tasks.build]
description = "Build the plugin package"
run = """
pnpm install --frozen-lockfile
pnpm build
"""
