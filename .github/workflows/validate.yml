name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: validate-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run validation (typecheck, lint, format, knip, test)
        run: mise run validate

      - name: Build plugin package
        run: mise run build
